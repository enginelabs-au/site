<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>ASCII AI Brain</title>
<style>
  :root {
    --bg: #030609;
    --fg: #dff7ff;
  }

  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background:
      radial-gradient(circle at 50% 45%, rgba(18,30,42,0.50) 0%, rgba(3,6,9,1) 74%),
      #030609;
  }

  #brain {
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
    display: block;
    white-space: pre;
    overflow: hidden;
    user-select: none;
    cursor: crosshair;
    color: var(--fg);
    font-family:
      "SFMono-Regular",
      Menlo,
      Consolas,
      "Liberation Mono",
      monospace;
    font-size: clamp(7px, 0.84vw, 12px);
    line-height: 0.82;
    letter-spacing: 0.005em;
    text-shadow:
      0 0 5px rgba(190,245,255,0.34),
      0 0 18px rgba(80,180,255,0.16);
  }

  html[data-embed="margin"],
  html[data-embed="margin"] body {
    background: #030609;
  }

  html[data-embed="section"],
  html[data-embed="section"] body {
    background:
      radial-gradient(circle at 50% 45%, rgba(18,30,42,0.50) 0%, rgba(3,6,9,1) 74%),
      #030609;
  }

  #brain[data-embed="margin"] {
    font-size: 7px;
  }
</style>
</head>
<body>
<pre id="brain" aria-label="interactive ascii AI brain animation"></pre>

<script>
(() => {
  const pre = document.getElementById("brain");
  const embedParam = new URLSearchParams(location.search).get("embed");
  const EMBED_SECTION = embedParam === "section";
  const EMBED_MARGIN = embedParam === "margin";
  const EDGE_PAD = EMBED_SECTION ? 8 : EMBED_MARGIN ? 8 : 4;

  if (EMBED_SECTION) {
    pre.dataset.embed = "section";
    document.documentElement.dataset.embed = "section";
  } else if (EMBED_MARGIN) {
    pre.dataset.embed = "margin";
    document.documentElement.dataset.embed = "margin";
  }

  let W = 158;
  let H = 62;
  let N = W * H;

  const TARGET_FPS = 24;
  const MAX_PULSES = 720;
  const MAX_SPORES = 170;
  const MAX_EDGES = 980;

  const CH = {
    empty: " ",
    tissue: ["`", ".", ".", "·", ":", "′"],
    rim: [".", ":", ";", ")", "(", "_", "-", "′"],
    edge: [".", ":", "-", "~", "=", "+", "*"],
    weak: [".", "·", ":", "˙"],
    aiEdge: [".", ":", "=", "+", "*", "#"],
    node: ["o", "O", "0", "@", "#"],
    hub: ["O", "0", "@", "#", "◉"],
    fixed: ["#", "@", "0", "◉", "#"],
    ai: ["□", "◇", "◆", "◈", "◉"],
    gate: ["[", "]", "{", "}", "#"],
    pulse: [".", "*", "+", "x", "×", "#", "@"],
    spore: ["'", "∙", "°", "*", "+"],
    matrix: ["0", "1", "·", ":", "|"],
    cut: [" ", " ", "·", "."]
  };

  const BAND = {
    theta: { f: 0.030, a: 0.20 },
    alpha: { f: 0.046, a: 0.25 },
    beta:  { f: 0.067, a: 0.18 },
    gamma: { f: 0.105, a: 0.13 },
    ai:    { f: 0.082, a: 0.24 }
  };

  const state = {
    frame: 0,
    t: 0,
    px: 0,
    py: 0,
    lastPX: 0,
    lastPY: 0,
    pointerDown: false,
    cutMode: false,
    dragStartNode: -1,
    nextBurst: 0
  };

  let grid, power, heat, mask, rim;
  let nodes = [];
  let edges = [];
  let pulses = [];
  let spores = [];
  let regions = [];
  let body = null;

  const rand = (a = 1, b = 0) => b + Math.random() * (a - b);
  const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
  const idx = (x, y) => y * W + x;
  const hypot = Math.hypot;

  function resize() {
    const vw = window.innerWidth;
    const vh = window.innerHeight;

    if (EMBED_SECTION) {
      let fontPx = Math.max(6, Math.min(14, Math.min(vw * 0.010, vh * 0.012)));
      let charW = fontPx * 0.64;
      let charH = fontPx * 0.80 * 0.82;

      W = Math.max(36, Math.min(220, Math.floor(vw / charW)));
      H = Math.max(28, Math.min(140, Math.floor(vh / charH)));

      while ((W * charW > vw - 2 || H * charH > vh - 2) && fontPx > 5.5) {
        fontPx -= 0.25;
        charW = fontPx * 0.64;
        charH = fontPx * 0.80 * 0.82;
        W = Math.max(36, Math.min(220, Math.floor(vw / charW)));
        H = Math.max(28, Math.min(140, Math.floor(vh / charH)));
      }

      pre.style.fontSize = `${fontPx}px`;
    } else if (EMBED_MARGIN) {
      let fontPx = Math.max(5, Math.min(12, Math.min(vw * 0.016, vh * 0.009)));
      let charW = fontPx * 0.64;
      let charH = fontPx * 0.80 * 0.82;

      W = Math.max(24, Math.min(110, Math.floor(vw / charW)));
      H = Math.max(24, Math.min(140, Math.floor(vh / charH)));

      while ((W * charW > vw - 2 || H * charH > vh - 2) && fontPx > 5) {
        fontPx -= 0.25;
        charW = fontPx * 0.64;
        charH = fontPx * 0.80 * 0.82;
        W = Math.max(24, Math.min(110, Math.floor(vw / charW)));
        H = Math.max(24, Math.min(140, Math.floor(vh / charH)));
      }

      pre.style.fontSize = `${fontPx}px`;
    } else {
      const fontPx = Math.max(7, Math.min(12, vw * 0.0084));
      W = clamp(Math.floor(vw / (fontPx * 0.64)), 126, 204);
      H = clamp(Math.floor(vh / (fontPx * 0.80)), 48, 82);
      pre.style.fontSize = "";
    }

    N = W * H;

    grid = new Array(N).fill(" ");
    power = new Float32Array(N);
    heat = new Float32Array(N);
    mask = new Uint8Array(N);
    rim = new Uint8Array(N);

    buildBrain();
  }

  function brainEquation(nx, ny) {
    const left = ((nx + 0.35) / 0.76) ** 2 + ((ny + 0.08) / 0.84) ** 2;
    const right = ((nx - 0.35) / 0.76) ** 2 + ((ny + 0.08) / 0.84) ** 2;
    const frontal = ((nx + 0.00) / 1.02) ** 2 + ((ny + 0.28) / 0.66) ** 2;
    const temporalL = ((nx + 0.57) / 0.46) ** 2 + ((ny - 0.24) / 0.34) ** 2;
    const temporalR = ((nx - 0.57) / 0.46) ** 2 + ((ny - 0.24) / 0.34) ** 2;
    const occipital = ((nx + 0.00) / 0.62) ** 2 + ((ny - 0.42) / 0.36) ** 2;
    const cerebellum = ((nx - 0.18) / 0.56) ** 2 + ((ny - 0.68) / 0.24) ** 2;
    const stem = Math.abs(nx - 0.17) < 0.10 && ny > 0.54 && ny < 0.95;

    const sulcus =
      Math.sin(nx * 13.0 + ny * 7.0) * 0.030 +
      Math.sin(nx * 21.0 - ny * 11.0) * 0.020 +
      Math.sin((nx + ny) * 17.0) * 0.014;

    const inside =
      left < 1 + sulcus ||
      right < 1 + sulcus ||
      frontal < 1 + sulcus ||
      temporalL < 1 ||
      temporalR < 1 ||
      occipital < 1 ||
      cerebellum < 1 ||
      stem;

    const cleft = Math.abs(nx) < 0.024 && ny < 0.45 && ny > -0.78;
    const lowerGap = ny > 0.76 && Math.abs(nx + 0.38) > 0.48;

    return inside && !cleft && !lowerGap;
  }

  function buildMask() {
    mask.fill(0);
    rim.fill(0);

    for (let y = 0; y < H; y++) {
      for (let x = 0; x < W; x++) {
        const nx = (x / (W - 1)) * 2 - 1;
        const ny = (y / (H - 1)) * 2 - 1;
        if (brainEquation(nx, ny)) mask[idx(x, y)] = 1;
      }
    }

    for (let y = 1; y < H - 1; y++) {
      for (let x = 1; x < W - 1; x++) {
        const id = idx(x, y);
        if (!mask[id]) continue;

        let count = 0;
        for (let yy = -1; yy <= 1; yy++) {
          for (let xx = -1; xx <= 1; xx++) {
            count += mask[idx(x + xx, y + yy)];
          }
        }

        if (count < 9) rim[id] = 1;
      }
    }
  }

  function buildBrain() {
    nodes = [];
    edges = [];
    pulses = [];
    spores = [];

    buildMask();

    const scale = Math.min(W, H) * (EMBED_SECTION ? 0.47 : EMBED_MARGIN ? 0.48 : 0.48);

    body = {
      x: W * 0.50,
      y: H * (EMBED_SECTION ? 0.54 : EMBED_MARGIN ? 0.52 : 0.48),
      tx: W * 0.50,
      ty: H * (EMBED_SECTION ? 0.54 : EMBED_MARGIN ? 0.52 : 0.48),
      vx: rand(0.010, -0.010),
      vy: rand(0.008, -0.008),
      angle: rand(0.06, -0.06),
      omega: rand(0.0010, -0.0010),
      scale,
      wanderPhase: rand(Math.PI * 2),
      radiusX: scale * 0.78,
      radiusY: scale * 0.58
    };

    regions = [
      { name: "input_layer_L",       kind: "ai", cx: -0.62, cy: -0.06, rx: 0.06, ry: 0.46, count: 20, hub: 2, fixed: 8, band: "ai",    dirx:  1.0, diry: 0.0, phase: 0.0 },
      { name: "input_layer_R",       kind: "ai", cx:  0.62, cy: -0.06, rx: 0.06, ry: 0.46, count: 20, hub: 2, fixed: 8, band: "ai",    dirx: -1.0, diry: 0.0, phase: 1.0 },

      { name: "encoder_stack_L",     kind: "ai", cx: -0.38, cy: -0.18, rx: 0.12, ry: 0.32, count: 24, hub: 4, fixed: 7, band: "beta",  dirx:  0.8, diry: 0.2, phase: 0.4 },
      { name: "encoder_stack_R",     kind: "ai", cx:  0.38, cy: -0.18, rx: 0.12, ry: 0.32, count: 24, hub: 4, fixed: 7, band: "beta",  dirx: -0.8, diry: 0.2, phase: 1.3 },

      { name: "attention_heads_A",   kind: "ai", cx: -0.20, cy:  0.04, rx: 0.12, ry: 0.12, count: 16, hub: 5, fixed: 5, band: "gamma", dirx:  0.4, diry: -0.7, phase: 0.7 },
      { name: "attention_heads_B",   kind: "ai", cx:  0.20, cy:  0.04, rx: 0.12, ry: 0.12, count: 16, hub: 5, fixed: 5, band: "gamma", dirx: -0.4, diry: -0.7, phase: 1.7 },
      { name: "latent_core",         kind: "ai", cx:  0.00, cy:  0.20, rx: 0.15, ry: 0.11, count: 20, hub: 7, fixed: 8, band: "ai",    dirx:  0.0, diry: -1.0, phase: 0.9 },

      { name: "memory_bank_L",       kind: "bio", cx: -0.26, cy:  0.34, rx: 0.14, ry: 0.10, count: 15, hub: 3, fixed: 4, band: "theta", dirx:  0.8, diry: 0.0, phase: 0.6 },
      { name: "memory_bank_R",       kind: "bio", cx:  0.26, cy:  0.34, rx: 0.14, ry: 0.10, count: 15, hub: 3, fixed: 4, band: "theta", dirx: -0.8, diry: 0.0, phase: 1.5 },

      { name: "reasoning_cortex_L",  kind: "bio", cx: -0.32, cy: -0.42, rx: 0.14, ry: 0.10, count: 16, hub: 3, fixed: 3, band: "beta",  dirx:  0.9, diry: 0.1, phase: 0.2 },
      { name: "reasoning_cortex_R",  kind: "bio", cx:  0.32, cy: -0.42, rx: 0.14, ry: 0.10, count: 16, hub: 3, fixed: 3, band: "beta",  dirx: -0.9, diry: 0.1, phase: 1.2 },

      { name: "output_layer",        kind: "ai", cx:  0.00, cy:  0.52, rx: 0.31, ry: 0.09, count: 24, hub: 4, fixed: 8, band: "alpha", dirx:  0.0, diry: -1.0, phase: 0.1 },
      { name: "critic_loop",         kind: "ai", cx:  0.18, cy:  0.68, rx: 0.20, ry: 0.08, count: 14, hub: 4, fixed: 5, band: "gamma", dirx: -0.4, diry: -1.0, phase: 2.0 },
      { name: "system_bus",          kind: "ai", cx:  0.15, cy:  0.80, rx: 0.08, ry: 0.06, count: 8,  hub: 5, fixed: 6, band: "ai",    dirx:  0.0, diry: -1.0, phase: 2.4 }
    ];

    let nodeId = 0;

    for (let r = 0; r < regions.length; r++) {
      const reg = regions[r];
      reg.nodeIds = [];

      for (let i = 0; i < reg.count; i++) {
        const g = sampleRegionPoint(reg, i);
        const fixed = i < reg.fixed;
        const hub = fixed || i < reg.hub;

        const node = {
          id: nodeId++,
          region: r,
          hub,
          fixed,
          ai: reg.kind === "ai",
          gate: fixed && reg.kind === "ai",
          ax: g.x,
          ay: g.y,
          lx: g.x + rand(0.010, -0.010),
          ly: g.y + rand(0.010, -0.010),
          lvx: rand(0.0003, -0.0003),
          lvy: rand(0.0003, -0.0003),
          wx: 0,
          wy: 0,
          activity: rand(0.26, 0.06),
          input: 0,
          stim: 0,
          refractory: 0,
          phase: rand(Math.PI * 2, 0),
          degree: 0
        };

        nodes.push(node);
        reg.nodeIds.push(node.id);
      }
    }

    updateWorldPositions(true);
    buildConnectome();
  }

  function sampleRegionPoint(reg, i) {
    if (reg.kind === "ai" && reg.name.includes("layer")) {
      const row = (i / Math.max(1, reg.count - 1)) * 2 - 1;
      const jitterX = rand(0.018, -0.018);
      const jitterY = rand(0.018, -0.018);
      const x = reg.cx + jitterX;
      const y = reg.cy + row * reg.ry + jitterY;
      if (isMaskedLocal(x, y)) return { x, y };
    }

    if (reg.kind === "ai" && reg.name.includes("stack")) {
      const col = (i % 4) / 3 * 2 - 1;
      const row = Math.floor(i / 4) / Math.max(1, Math.ceil(reg.count / 4) - 1) * 2 - 1;
      const x = reg.cx + col * reg.rx * 0.65 + rand(0.010, -0.010);
      const y = reg.cy + row * reg.ry * 0.85 + rand(0.010, -0.010);
      if (isMaskedLocal(x, y)) return { x, y };
    }

    if (reg.kind === "ai" && reg.name.includes("attention")) {
      const a = (i / reg.count) * Math.PI * 2;
      const ring = i < reg.fixed ? 0.42 : rand(1.0, 0.45);
      const x = reg.cx + Math.cos(a) * reg.rx * ring + rand(0.010, -0.010);
      const y = reg.cy + Math.sin(a) * reg.ry * ring + rand(0.010, -0.010);
      if (isMaskedLocal(x, y)) return { x, y };
    }

    return sampleMaskedEllipse(reg.cx, reg.cy, reg.rx, reg.ry);
  }

  function isMaskedLocal(x, y) {
    const wx = Math.round((x * 0.5 + 0.5) * (W - 1));
    const wy = Math.round((y * 0.5 + 0.5) * (H - 1));
    return wx > 1 && wy > 1 && wx < W - 2 && wy < H - 2 && mask[idx(wx, wy)];
  }

  function sampleMaskedEllipse(cx, cy, rx, ry) {
    for (let k = 0; k < 800; k++) {
      const a = rand(Math.PI * 2, 0);
      const m = Math.sqrt(rand());
      const x = cx + Math.cos(a) * rx * m;
      const y = cy + Math.sin(a) * ry * m;
      const wx = Math.round((x * 0.5 + 0.5) * (W - 1));
      const wy = Math.round((y * 0.5 + 0.5) * (H - 1));

      if (wx > 1 && wy > 1 && wx < W - 2 && wy < H - 2 && mask[idx(wx, wy)]) {
        return { x, y };
      }
    }

    return { x: cx, y: cy };
  }

  function findRegion(name) {
    return regions.findIndex(r => r.name === name);
  }

  function addEdge(a, b, w, type) {
    if (a === b || edges.length >= MAX_EDGES) return;
    if (a > b) [a, b] = [b, a];

    for (let i = 0; i < edges.length; i++) {
      if (edges[i].a === a && edges[i].b === b) return;
    }

    const rest = localDist(nodes[a], nodes[b]);

    edges.push({
      a, b,
      w,
      base: w,
      type,
      flow: 0,
      broken: 0,
      idle: 0,
      rest,
      age: rand(1000)
    });

    nodes[a].degree++;
    nodes[b].degree++;
  }

  function localDist(a, b) {
    return hypot(a.lx - b.lx, a.ly - b.ly);
  }

  function buildConnectome() {
    const byRegion = regions.map(r => r.nodeIds.slice());

    for (let r = 0; r < regions.length; r++) {
      const ids = byRegion[r];

      for (const id of ids) {
        const near = ids
          .filter(j => j !== id)
          .map(j => ({ j, d: localDist(nodes[id], nodes[j]) }))
          .sort((m, n) => m.d - n.d);

        const k = nodes[id].fixed ? 8 : nodes[id].hub ? 6 : 4;

        for (let i = 0; i < Math.min(k, near.length); i++) {
          addEdge(id, near[i].j, rand(0.88, 0.52), nodes[id].ai ? "aiLocal" : "local");
        }
      }
    }

    feedForward("input_layer_L", "encoder_stack_L", 0.68);
    feedForward("input_layer_R", "encoder_stack_R", 0.68);
    feedForward("encoder_stack_L", "attention_heads_A", 0.64);
    feedForward("encoder_stack_R", "attention_heads_B", 0.64);
    feedForward("attention_heads_A", "latent_core", 0.72);
    feedForward("attention_heads_B", "latent_core", 0.72);
    feedForward("latent_core", "memory_bank_L", 0.58);
    feedForward("latent_core", "memory_bank_R", 0.58);
    feedForward("memory_bank_L", "output_layer", 0.58);
    feedForward("memory_bank_R", "output_layer", 0.58);
    feedForward("latent_core", "output_layer", 0.70);
    feedForward("output_layer", "critic_loop", 0.62);
    feedForward("critic_loop", "latent_core", 0.50);
    feedForward("system_bus", "latent_core", 0.76);
    feedForward("system_bus", "critic_loop", 0.72);

    pairRegions("input_layer_L", "input_layer_R", 8, 0.58);
    pairRegions("encoder_stack_L", "encoder_stack_R", 8, 0.62);
    pairRegions("attention_heads_A", "attention_heads_B", 8, 0.70);
    pairRegions("memory_bank_L", "memory_bank_R", 6, 0.66);
    pairRegions("reasoning_cortex_L", "reasoning_cortex_R", 6, 0.66);

    connectRegionGroups("reasoning_cortex_L", "encoder_stack_L", 7, 0.60);
    connectRegionGroups("reasoning_cortex_R", "encoder_stack_R", 7, 0.60);
    connectRegionGroups("reasoning_cortex_L", "attention_heads_A", 5, 0.62);
    connectRegionGroups("reasoning_cortex_R", "attention_heads_B", 5, 0.62);
    connectRegionGroups("reasoning_cortex_L", "latent_core", 5, 0.62);
    connectRegionGroups("reasoning_cortex_R", "latent_core", 5, 0.62);

    const hubs = nodes.filter(n => n.hub).map(n => n.id);

    for (let i = 0; i < hubs.length; i++) {
      for (let j = i + 1; j < hubs.length; j++) {
        const a = nodes[hubs[i]];
        const b = nodes[hubs[j]];

        if (a.region !== b.region && Math.random() < 0.30) {
          addEdge(a.id, b.id, rand(0.86, 0.52), a.ai || b.ai ? "attention" : "rich");
        }
      }
    }

    const fixed = nodes.filter(n => n.fixed).map(n => n.id);

    for (let i = 0; i < fixed.length; i++) {
      for (let j = i + 1; j < fixed.length; j++) {
        const a = nodes[fixed[i]];
        const b = nodes[fixed[j]];

        if (a.region !== b.region && Math.random() < 0.35) {
          addEdge(a.id, b.id, rand(0.92, 0.60), "fixed");
        }
      }
    }
  }

  function feedForward(aName, bName, strength) {
    const ar = findRegion(aName);
    const br = findRegion(bName);
    if (ar < 0 || br < 0) return;

    const a = regions[ar].nodeIds;
    const b = regions[br].nodeIds;

    for (let i = 0; i < a.length; i++) {
      const ai = a[i];
      const step = Math.max(1, Math.floor(b.length / Math.max(1, a.length)));
      const start = Math.floor((i / Math.max(1, a.length - 1)) * Math.max(0, b.length - 1));

      for (let k = 0; k < 2; k++) {
        const bj = b[(start + k * step) % b.length];
        addEdge(ai, bj, rand(strength + 0.08, strength - 0.08), "feedforward");
      }
    }
  }

  function pairRegions(aName, bName, nPairs, strength) {
    const ar = findRegion(aName);
    const br = findRegion(bName);
    if (ar < 0 || br < 0) return;

    const a = regions[ar].nodeIds.slice();
    const b = regions[br].nodeIds.slice();

    for (let i = 0; i < Math.min(nPairs, a.length, b.length); i++) {
      addEdge(a[i], b[i], rand(strength + 0.10, strength - 0.06), "homolog");
    }
  }

  function connectRegionGroups(aName, bName, count, strength) {
    const ar = findRegion(aName);
    const br = findRegion(bName);
    if (ar < 0 || br < 0) return;

    const a = regions[ar].nodeIds.slice();
    const b = regions[br].nodeIds.slice();

    for (let i = 0; i < count; i++) {
      const ai = a[Math.floor(rand(a.length))];
      const bj = b[Math.floor(rand(b.length))];
      addEdge(ai, bj, rand(strength + 0.08, strength - 0.08), "tract");
    }
  }

  function updateBody() {
    const minX = body.radiusX + EDGE_PAD;
    const maxX = W - body.radiusX - EDGE_PAD;
    const minY = body.radiusY + Math.max(3, EDGE_PAD - 4);
    const maxY = H - body.radiusY - Math.max(3, EDGE_PAD - 4);

    const wanderScale = EMBED_SECTION ? 0.26 : EMBED_MARGIN ? 0.20 : 0.34;
    const wanderScaleY = EMBED_SECTION ? 0.24 : EMBED_MARGIN ? 0.18 : 0.30;

    const orbitX =
      W * 0.50 +
      Math.sin(state.t * 0.0018 + body.wanderPhase) * Math.max(2, (W * 0.50 - body.radiusX - 8) * wanderScale) +
      Math.sin(state.t * 0.0010 + body.wanderPhase * 1.7) * Math.max(1, (W * 0.50 - body.radiusX - 8) * (wanderScale * 0.30));

    const orbitY =
      H * (EMBED_SECTION ? 0.56 : EMBED_MARGIN ? 0.54 : 0.50) +
      Math.cos(state.t * 0.0016 + body.wanderPhase * 0.7) * Math.max(1, (H * 0.50 - body.radiusY - 6) * wanderScaleY) +
      Math.sin(state.t * 0.0009 + body.wanderPhase * 2.1) * Math.max(1, (H * 0.50 - body.radiusY - 6) * (wanderScaleY * 0.30));

    body.tx = clamp(orbitX, minX, maxX);
    body.ty = clamp(orbitY, minY, maxY);

    body.vx += (body.tx - body.x) * 0.0014;
    body.vy += (body.ty - body.y) * 0.0014;
    body.omega += (-body.angle) * 0.00012 + Math.sin(state.t * 0.0026) * 0.000016;

    body.vx *= 0.970;
    body.vy *= 0.970;
    body.omega *= 0.974;

    body.x += body.vx;
    body.y += body.vy;
    body.angle += body.omega;

    body.x = clamp(body.x, minX, maxX);
    body.y = clamp(body.y, minY, maxY);

    if (body.x === minX || body.x === maxX) body.vx *= -0.10;
    if (body.y === minY || body.y === maxY) body.vy *= -0.10;
  }

  function updateLocalPhysics() {
    for (let i = 0; i < nodes.length; i++) {
      const n = nodes[i];
      const reg = regions[n.region];

      const wave = regionalWave(n, reg);
      const aiGridLock = n.ai ? 1.35 : 1.0;
      const swirlX = reg.diry * wave * (n.fixed ? 0.00045 : 0.0017);
      const swirlY = -reg.dirx * wave * (n.fixed ? 0.00045 : 0.0017);

      const anchor = (n.fixed ? 0.060 : 0.020) * aiGridLock;
      const damp = n.fixed ? 0.74 : n.ai ? 0.82 : 0.86;

      n.lvx += (n.ax - n.lx) * anchor + swirlX;
      n.lvy += (n.ay - n.ly) * anchor + swirlY;

      n.lvx *= damp;
      n.lvy *= damp;

      n.lx += n.lvx;
      n.ly += n.lvy;
    }

    for (let i = 0; i < edges.length; i++) {
      const e = edges[i];
      const a = nodes[e.a];
      const b = nodes[e.b];

      let dx = b.lx - a.lx;
      let dy = b.ly - a.ly;
      const d = hypot(dx, dy) || 1e-6;
      const target = e.rest * (1 + e.broken * 0.10);
      const stretch = d - target;

      const k =
        e.type === "aiLocal" ? 0.0078 :
        e.type === "feedforward" ? 0.0068 :
        e.type === "attention" ? 0.0056 :
        e.type === "fixed" ? 0.0062 :
        e.type === "local" ? 0.0066 :
        e.type === "rich"  ? 0.0042 :
        0.0050;

      const force = stretch * k * e.w;

      dx /= d;
      dy /= d;

      const am = a.fixed ? 0.10 : a.ai ? 0.58 : 0.68;
      const bm = b.fixed ? 0.10 : b.ai ? 0.58 : 0.68;

      a.lvx +=  dx * force * am;
      a.lvy +=  dy * force * am;
      b.lvx -=  dx * force * bm;
      b.lvy -=  dy * force * bm;
    }

    for (let r = 0; r < regions.length; r++) {
      const ids = regions[r].nodeIds;

      for (let i = 0; i < ids.length; i++) {
        for (let j = i + 1; j < ids.length; j++) {
          const a = nodes[ids[i]];
          const b = nodes[ids[j]];

          let dx = b.lx - a.lx;
          let dy = b.ly - a.ly;
          let d2 = dx * dx + dy * dy;

          if (d2 < 0.00145 && d2 > 0) {
            const f = 0.00034 / d2;
            a.lvx -= dx * f * (a.fixed ? 0.06 : 0.56);
            a.lvy -= dy * f * (a.fixed ? 0.06 : 0.56);
            b.lvx += dx * f * (b.fixed ? 0.06 : 0.56);
            b.lvy += dy * f * (b.fixed ? 0.06 : 0.56);
          }
        }
      }
    }
  }

  function regionalWave(n, reg) {
    const band = BAND[reg.band];
    const proj = n.ax * reg.dirx + n.ay * reg.diry;

    const carrier =
      Math.sin(state.t * band.f - proj * 6.3 + reg.phase + n.phase * 0.10) * band.a;

    const envelope =
      0.78 + 0.22 * Math.sin(state.t * 0.0082 + reg.phase + proj * 1.6);

    const clock =
      n.ai ? 0.09 * Math.sin(state.t * 0.095 + n.phase + n.region) : 0;

    const thal =
      0.052 * Math.sin(state.t * 0.034 - n.ay * 4.8 + 0.6);

    return carrier * envelope + thal + clock;
  }

  function updateWorldPositions(initial = false) {
    const c = Math.cos(body.angle);
    const s = Math.sin(body.angle);

    for (let i = 0; i < nodes.length; i++) {
      const n = nodes[i];
      const x = n.lx * body.scale;
      const y = n.ly * body.scale;

      n.wx = body.x + x * c - y * s;
      n.wy = body.y + x * s + y * c;

      if (initial) n.activity = rand(0.24, 0.06);
    }
  }

  function updateActivity() {
    let mean = 0;

    for (let i = 0; i < nodes.length; i++) mean += nodes[i].activity;

    mean /= nodes.length || 1;

    const inhibition = clamp((mean - 0.54) * 1.0, 0, 0.58);

    for (let i = 0; i < nodes.length; i++) {
      const n = nodes[i];
      const reg = regions[n.region];
      const wave = regionalWave(n, reg);

      const baseInput =
        wave * (n.ai ? 0.36 : 0.30) +
        n.input * (n.ai ? 0.52 : 0.46) +
        n.stim * 0.17 -
        inhibition;

      n.activity += (baseInput - n.activity) * (n.ai ? 0.130 : 0.110);
      n.activity = clamp(n.activity, 0, 1.75);

      n.stim *= 0.90;
      n.input *= 0.45;
      n.refractory = Math.max(0, n.refractory - 1);

      const threshold = n.fixed ? 0.74 : n.hub ? 0.84 : 1.00;

      if (n.activity > threshold && n.refractory === 0) {
        const p = (n.activity - threshold) * (n.fixed ? 0.13 : n.hub ? 0.11 : 0.074);

        if (Math.random() < p) {
          fireNode(n.id, n.activity);
          n.refractory = n.fixed ? 4 : n.hub ? 5 : 7;
        }
      }
    }
  }

  function fireNode(nodeId, powerLevel) {
    for (let i = 0; i < edges.length; i++) {
      const e = edges[i];

      if (e.broken > 0.92) continue;
      if (e.a !== nodeId && e.b !== nodeId) continue;

      const towardB = e.a === nodeId;
      const baseSpeed =
        e.type === "feedforward" ? 0.058 :
        e.type === "attention" ? 0.052 :
        e.type === "aiLocal" ? 0.052 :
        e.type === "fixed" ? 0.047 :
        e.type === "rich"  ? 0.045 :
        e.type === "local" ? 0.052 :
        0.041;

      const dist = worldDist(nodes[e.a], nodes[e.b]);
      const speed = baseSpeed / (1 + dist * 0.036);

      if (pulses.length < MAX_PULSES) {
        pulses.push({
          edge: i,
          u: towardB ? 0 : 1,
          dir: towardB ? 1 : -1,
          speed,
          power: clamp(powerLevel * e.w * (1 - e.broken), 0.12, 1.50),
          trail: rand(0.18, 0.06)
        });
      }
    }
  }

  function worldDist(a, b) {
    return hypot(a.wx - b.wx, a.wy - b.wy);
  }

  function updatePulses() {
    for (let i = 0; i < edges.length; i++) {
      edges[i].flow *= 0.84;
      edges[i].idle++;
      edges[i].age++;
      edges[i].w += (edges[i].base - edges[i].w) * 0.002;
      edges[i].broken *= 0.982;
    }

    for (let i = 0; i < pulses.length; i++) {
      const p = pulses[i];
      const e = edges[p.edge];

      if (!e) {
        pulses.splice(i--, 1);
        continue;
      }

      p.u += p.speed * p.dir;
      e.flow = Math.min(1.55, e.flow + p.power * 0.15);
      e.idle = 0;

      if (p.u <= 0 || p.u >= 1) {
        const target = p.u >= 1 ? e.b : e.a;

        nodes[target].input += p.power * 0.36;
        nodes[target].stim += p.power * 0.11;

        pulses.splice(i--, 1);
      }
    }
  }

  function updateEntropyAndRepair() {
    for (let i = 0; i < edges.length; i++) {
      const e = edges[i];
      const protectedType =
        e.type === "rich" ||
        e.type === "homolog" ||
        e.type === "fixed" ||
        e.type === "feedforward" ||
        e.type === "attention";

      const lowUse = e.idle > 190 && e.flow < 0.022 && !protectedType;

      if (lowUse) e.w *= 0.9995;
      if (e.broken > 0.70) e.w *= 0.997;
    }

    if (Math.random() < 0.014) {
      const candidates = nodes.filter(n => n.degree < 5);

      if (candidates.length) {
        const n = candidates[Math.floor(rand(candidates.length))];
        spawnSpore(n.wx, n.wy, n.id);
      }
    }

    if (Math.random() < 0.004) {
      for (let i = edges.length - 1; i >= 0; i--) {
        const e = edges[i];

        if (
          e.w < 0.052 &&
          e.type !== "rich" &&
          e.type !== "homolog" &&
          e.type !== "fixed" &&
          e.type !== "feedforward" &&
          e.type !== "attention"
        ) {
          nodes[e.a].degree--;
          nodes[e.b].degree--;
          edges.splice(i, 1);
          break;
        }
      }
    }
  }

  function spawnSpore(x, y, fromNode = -1) {
    if (spores.length >= MAX_SPORES) spores.shift();

    spores.push({
      x, y,
      vx: rand(0.045, -0.045),
      vy: rand(0.036, -0.036),
      life: rand(230, 110),
      age: 0,
      from: fromNode >= 0 ? fromNode : nearestNode(x, y, 10),
      bonded: false
    });
  }

  function updateSpores() {
    for (let i = 0; i < spores.length; i++) {
      const s = spores[i];

      s.age++;

      const nearest = nearestNode(s.x, s.y, 20);

      let tx = body.x;
      let ty = body.y;

      if (nearest >= 0) {
        tx = nodes[nearest].wx;
        ty = nodes[nearest].wy;
      }

      const dx = tx - s.x;
      const dy = ty - s.y;
      const d = hypot(dx, dy) || 1;

      s.vx += (dx / d) * 0.0043 + Math.sin(state.t * 0.022 + s.y) * 0.0012;
      s.vy += (dy / d) * 0.0043 + Math.cos(state.t * 0.020 + s.x) * 0.0012;

      s.vx *= 0.94;
      s.vy *= 0.94;

      s.x += s.vx;
      s.y += s.vy;

      s.x = clamp(s.x, 1, W - 2);
      s.y = clamp(s.y, 1, H - 2);

      if (!s.bonded && nearest >= 0 && s.from >= 0 && nearest !== s.from) {
        const already = hasEdge(s.from, nearest);

        if (!already && worldDist(nodes[s.from], nodes[nearest]) > 4) {
          addEdge(s.from, nearest, rand(0.38, 0.16), nodes[nearest].ai ? "grownAI" : "grown");
          nodes[s.from].stim += 0.20;
          nodes[nearest].stim += 0.20;
          s.bonded = true;
          s.life = Math.min(s.life, s.age + 16);
        }
      }

      if (s.age > s.life) spores.splice(i--, 1);
    }
  }

  function spontaneousBursts() {
    if (state.t < state.nextBurst) return;

    state.nextBurst = state.t + rand(230, 70);

    const fixedOrHub = nodes.filter(n => n.fixed || n.hub);
    const seed = fixedOrHub[Math.floor(rand(fixedOrHub.length))];

    if (!seed) return;

    seed.activity = Math.max(seed.activity, 1.06);
    seed.stim += 0.58;
    seed.refractory = 0;

    fireNode(seed.id, 1.18);
  }

  function hasEdge(a, b) {
    if (a > b) [a, b] = [b, a];

    for (let i = 0; i < edges.length; i++) {
      if (edges[i].a === a && edges[i].b === b) return true;
    }

    return false;
  }

  function nearestNode(x, y, maxD = 10) {
    let best = -1;
    let bd = maxD * maxD;

    for (let i = 0; i < nodes.length; i++) {
      const dx = nodes[i].wx - x;
      const dy = nodes[i].wy - y;
      const d = dx * dx + dy * dy;

      if (d < bd) {
        bd = d;
        best = i;
      }
    }

    return best;
  }

  function clearGrid() {
    for (let i = 0; i < N; i++) {
      grid[i] = " ";
      power[i] *= 0.62;
      heat[i] *= 0.78;
    }
  }

  function plot(x, y, ch, p = 1) {
    x = Math.round(x);
    y = Math.round(y);

    if (x < 0 || y < 0 || x >= W || y >= H) return;

    const id = idx(x, y);

    if (p >= power[id]) {
      power[id] = p;
      grid[id] = ch;
    }

    heat[id] = Math.max(heat[id], p);
  }

  function renderMaskTissue() {
    const c = Math.cos(body.angle);
    const s = Math.sin(body.angle);

    for (let y = 0; y < H; y++) {
      for (let x = 0; x < W; x++) {
        const lx = ((x - body.x) * c + (y - body.y) * s) / body.scale;
        const ly = (-(x - body.x) * s + (y - body.y) * c) / body.scale;

        const mx = Math.round((lx * 0.5 + 0.5) * (W - 1));
        const my = Math.round((ly * 0.5 + 0.5) * (H - 1));

        if (mx < 0 || my < 0 || mx >= W || my >= H) continue;

        const mid = idx(mx, my);
        if (!mask[mid]) continue;

        const noise =
          Math.sin(mid * 0.031 + state.t * 0.012) +
          Math.sin(mid * 0.007 - state.t * 0.016);

        if (rim[mid]) {
          if (noise > -0.20) {
            plot(x, y, CH.rim[(mid + state.frame) % CH.rim.length], 0.25);
          }
        } else if (noise > 1.13) {
          plot(x, y, CH.tissue[(mid + state.frame) % CH.tissue.length], 0.16);
        }
      }
    }
  }

  function renderMatrixField() {
    const c = Math.cos(body.angle);
    const s = Math.sin(body.angle);

    for (let y = 3; y < H - 3; y += 2) {
      for (let x = 3; x < W - 3; x += 4) {
        const lx = ((x - body.x) * c + (y - body.y) * s) / body.scale;
        const ly = (-(x - body.x) * s + (y - body.y) * c) / body.scale;

        const mx = Math.round((lx * 0.5 + 0.5) * (W - 1));
        const my = Math.round((ly * 0.5 + 0.5) * (H - 1));

        if (mx < 0 || my < 0 || mx >= W || my >= H) continue;
        if (!mask[idx(mx, my)]) continue;

        const v = Math.sin(x * 0.11 + y * 0.19 + state.t * 0.035);
        if (v > 0.74) {
          const ch = CH.matrix[(x + y + state.frame) % CH.matrix.length];
          plot(x, y, ch, 0.22);
        }
      }
    }
  }

  function renderEdges() {
    for (let i = 0; i < edges.length; i++) {
      const e = edges[i];
      const a = nodes[e.a];
      const b = nodes[e.b];

      const act = clamp(
        e.w * 0.58 +
        e.flow * 0.44 +
        (a.activity + b.activity) * 0.09 +
        Math.sin(state.t * 0.012 + e.age * 0.05) * 0.06,
        0.04,
        1.54
      );

      drawLine(a.wx, a.wy, b.wx, b.wy, act, e.broken, e.type);
    }
  }

  function drawLine(x0, y0, x1, y1, p, broken, type) {
    const dx = x1 - x0;
    const dy = y1 - y0;
    const steps = Math.max(1, Math.ceil(Math.max(Math.abs(dx), Math.abs(dy)) * 1.13));

    const aiType =
      type === "feedforward" ||
      type === "attention" ||
      type === "aiLocal" ||
      type === "grownAI";

    const set =
      broken > 0.45 ? CH.cut :
      aiType ? CH.aiEdge :
      type === "local" ? CH.weak :
      CH.edge;

    const ci = clamp(Math.floor(p * 2.1), 0, set.length - 1);

    for (let i = 0; i <= steps; i++) {
      const u = i / steps;

      if (broken > 0.15 && Math.sin(i * 1.4 + state.t * 0.044) < broken * 0.70) continue;

      const wob =
        aiType
          ? Math.sin(u * Math.PI * 2 + state.t * 0.032) * 0.030
          : Math.sin(u * Math.PI + state.t * 0.020) * 0.050;

      const x = x0 + dx * u + wob * (dy * 0.018);
      const y = y0 + dy * u - wob * (dx * 0.009);

      plot(x, y, set[ci], p * (0.58 + 0.42 * Math.sin(u * Math.PI)));
    }
  }

  function renderAttentionRings() {
    const attentionRegions = ["attention_heads_A", "attention_heads_B", "latent_core"];

    for (const name of attentionRegions) {
      const r = regions[findRegion(name)];
      if (!r) continue;

      let cx = 0;
      let cy = 0;

      for (const id of r.nodeIds) {
        cx += nodes[id].wx;
        cy += nodes[id].wy;
      }

      cx /= r.nodeIds.length;
      cy /= r.nodeIds.length;

      const radius = name === "latent_core" ? 7.2 : 5.0;
      const phase = state.t * 0.035 + r.phase;

      for (let i = 0; i < 48; i++) {
        const a = (i / 48) * Math.PI * 2 + phase;
        const flicker = Math.sin(i * 0.7 + state.t * 0.06);
        if (flicker < -0.20) continue;

        const x = cx + Math.cos(a) * radius;
        const y = cy + Math.sin(a) * radius * 0.52;
        plot(x, y, i % 4 === 0 ? "+" : ".", 0.62);
      }
    }
  }

  function renderPulses() {
    for (let i = 0; i < pulses.length; i++) {
      const p = pulses[i];
      const e = edges[p.edge];

      if (!e) continue;

      const a = nodes[e.a];
      const b = nodes[e.b];
      const x = a.wx + (b.wx - a.wx) * p.u;
      const y = a.wy + (b.wy - a.wy) * p.u;
      const ch = CH.pulse[clamp(Math.floor(p.power * 2.4), 0, CH.pulse.length - 1)];

      plot(x, y, ch, 1.7 + p.power);

      for (let k = 1; k <= 3; k++) {
        const uu = p.u - p.dir * p.trail * k;

        if (uu > 0 && uu < 1) {
          const tx = a.wx + (b.wx - a.wx) * uu;
          const ty = a.wy + (b.wy - a.wy) * uu;

          plot(tx, ty, k === 1 ? "*" : k === 2 ? ":" : ".", p.power * (0.65 / k));
        }
      }
    }
  }

  function renderSpores() {
    for (let i = 0; i < spores.length; i++) {
      const s = spores[i];
      const life = 1 - s.age / s.life;
      const ch = CH.spore[clamp(Math.floor(life * CH.spore.length), 0, CH.spore.length - 1)];

      plot(s.x, s.y, ch, 0.9 + life);

      if (Math.random() < 0.20) {
        plot(s.x - s.vx * 2, s.y - s.vy * 2, ".", 0.42);
      }
    }
  }

  function renderNodes() {
    for (let i = 0; i < nodes.length; i++) {
      const n = nodes[i];

      const set =
        n.gate ? CH.gate :
        n.ai ? CH.ai :
        n.fixed ? CH.fixed :
        n.hub ? CH.hub :
        CH.node;

      const ch = set[clamp(Math.floor(n.activity * 2.4), 0, set.length - 1)];

      plot(n.wx, n.wy, ch, n.fixed ? 2.88 + n.activity : 2.0 + n.activity);

      if (n.activity > 1.02) {
        plot(n.wx + 1, n.wy, "·", 0.45);
        plot(n.wx - 1, n.wy, "·", 0.45);
      }

      if (n.fixed && n.activity > 0.70) {
        plot(n.wx, n.wy - 1, ".", 0.50);
        plot(n.wx, n.wy + 1, ".", 0.50);
      }

      if (n.ai && n.activity > 0.82) {
        plot(n.wx + 1, n.wy + 1, "`", 0.36);
        plot(n.wx - 1, n.wy - 1, "`", 0.36);
      }
    }
  }

  function render() {
    clearGrid();
    renderMaskTissue();
    renderMatrixField();
    renderEdges();
    renderAttentionRings();
    renderPulses();
    renderSpores();
    renderNodes();

    let out = "";

    for (let y = 0; y < H; y++) {
      let row = "";

      for (let x = 0; x < W; x++) row += grid[idx(x, y)];

      out += row + (y < H - 1 ? "\n" : "");
    }

    pre.textContent = out;
  }

  function tick() {
    state.frame++;
    state.t++;

    updateBody();
    updateLocalPhysics();
    updateWorldPositions();
    updateActivity();
    updatePulses();
    updateSpores();
    updateEntropyAndRepair();
    spontaneousBursts();

    if (state.pointerDown) {
      dragInteract();
    } else if (Math.random() < 0.009) {
      const n = nodes[Math.floor(rand(nodes.length))];

      if (n.activity > 0.68) spawnSpore(n.wx, n.wy, n.id);
    }

    render();
    setTimeout(() => requestAnimationFrame(tick), 1000 / TARGET_FPS);
  }

  function eventToGrid(e) {
    const r = pre.getBoundingClientRect();

    return {
      x: clamp(((e.clientX - r.left) / r.width) * W, 0, W - 1),
      y: clamp(((e.clientY - r.top) / r.height) * H, 0, H - 1)
    };
  }

  function dragInteract() {
    const dx = state.px - state.lastPX;
    const dy = state.py - state.lastPY;
    const steps = Math.max(1, Math.ceil(hypot(dx, dy)));

    for (let i = 0; i <= steps; i++) {
      const u = i / steps;
      const x = state.lastPX + dx * u;
      const y = state.lastPY + dy * u;

      if (state.cutMode) {
        cutNear(x, y);
      } else {
        stimulateNear(x, y);
        if (Math.random() < 0.24) spawnSpore(x, y);
      }
    }

    state.lastPX = state.px;
    state.lastPY = state.py;
  }

  function stimulateNear(x, y) {
    const n = nearestNode(x, y, 10);

    if (n >= 0) {
      nodes[n].stim += 0.72;
      nodes[n].activity = Math.max(nodes[n].activity, 0.74);

      const pullX = (x - nodes[n].wx) * 0.00016;
      const pullY = (y - nodes[n].wy) * 0.00016;

      body.vx += pullX;
      body.vy += pullY;

      if (state.dragStartNode < 0) state.dragStartNode = n;
    }
  }

  function cutNear(x, y) {
    for (let i = 0; i < edges.length; i++) {
      const e = edges[i];
      const a = nodes[e.a];
      const b = nodes[e.b];
      const d = pointSegDist(x, y, a.wx, a.wy, b.wx, b.wy);

      if (d < 1.35) {
        e.broken = Math.min(1, e.broken + 0.46);
        e.w *= 0.78;
      }
    }
  }

  function pointSegDist(px, py, ax, ay, bx, by) {
    const vx = bx - ax;
    const vy = by - ay;
    const wx = px - ax;
    const wy = py - ay;
    const c1 = vx * wx + vy * wy;

    if (c1 <= 0) return hypot(px - ax, py - ay);

    const c2 = vx * vx + vy * vy;

    if (c2 <= c1) return hypot(px - bx, py - by);

    const t = c1 / c2;

    return hypot(px - (ax + t * vx), py - (ay + t * vy));
  }

  pre.addEventListener("pointerdown", e => {
    const p = eventToGrid(e);

    state.pointerDown = true;
    state.cutMode = e.shiftKey || e.altKey || e.metaKey || e.button === 2;
    state.px = state.lastPX = p.x;
    state.py = state.lastPY = p.y;
    state.dragStartNode = state.cutMode ? -1 : nearestNode(p.x, p.y, 10);

    if (state.cutMode) {
      cutNear(p.x, p.y);
    } else {
      stimulateNear(p.x, p.y);
      spawnSpore(p.x, p.y, state.dragStartNode);
    }

    pre.setPointerCapture(e.pointerId);
  });

  pre.addEventListener("pointermove", e => {
    const p = eventToGrid(e);
    state.px = p.x;
    state.py = p.y;
  });

  pre.addEventListener("pointerup", e => {
    if (!state.cutMode && state.dragStartNode >= 0) {
      const endNode = nearestNode(state.px, state.py, 10);

      if (endNode >= 0 && endNode !== state.dragStartNode && !hasEdge(state.dragStartNode, endNode)) {
        addEdge(state.dragStartNode, endNode, rand(0.44, 0.20), nodes[endNode].ai ? "grownAI" : "user");
        nodes[state.dragStartNode].stim += 0.52;
        nodes[endNode].stim += 0.52;
      }
    }

    state.pointerDown = false;
    state.dragStartNode = -1;
    pre.releasePointerCapture(e.pointerId);
  });

  pre.addEventListener("contextmenu", e => e.preventDefault());

  window.addEventListener("keydown", e => {
    const k = e.key.toLowerCase();

    if (k === "r") buildBrain();

    if (k === "b") {
      const hubs = nodes.filter(n => n.fixed || n.hub);
      const n = hubs[Math.floor(rand(hubs.length))] || nodes[Math.floor(rand(nodes.length))];

      n.activity = 1.10;
      n.stim += 0.72;
      fireNode(n.id, 1.24);
    }

    if (k === "g") {
      const n = nodes[Math.floor(rand(nodes.length))];
      spawnSpore(n.wx, n.wy, n.id);
    }

    if (k === " ") {
      body.vx += rand(0.10, -0.10);
      body.vy += rand(0.08, -0.08);
    }
  });

  window.addEventListener("resize", () => {
    clearTimeout(window.__asciiAIBrainResize);
    window.__asciiAIBrainResize = setTimeout(resize, 180);
  });

  resize();
  tick();
})();
</script>
